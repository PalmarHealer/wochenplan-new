services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ghcr.io/palmarhealer/wochenplan-new:latest
        ports:
            - "80:80"   # Nginx HTTP
            # - "2222:22" # SSH (optional; requires SSH_AUTHORIZED_KEYS_URL)
        environment:
            # Laravel application key for encryption
            # Leave empty to auto-generate on first run (will be printed in logs)
            # APP_KEY:
            APP_NAME: Wochenplan
            APP_URL: http://localhost
            APP_DEBUG: false
            APP_LOCALE: de
            APP_FAKER_LOCALE: de_DE
            FORCE_HTTPS: false

            # Settings
            DAY_VIEW_DISPLAY_ALL_ABSENCE_NOTES: true
            ALLOW_REGISTRATION: true

            # Trusted proxies.
            # Set this if you have a npm, traefic, cloudflare or similar setup
            # (where your container is proxied), for example, 172.22.0.0/16
            TRUSTED_PROXIES:

            # Database
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: wochenplan
            DB_USERNAME: wochenplan
            DB_PASSWORD: wochenplan

            # URL to public SSH keys (e.g., https://github.com/<your-user>.keys). If empty or unset, SSH will be disabled.
            SSH_AUTHORIZED_KEYS_URL:

            # First user and Admin login
            ADMIN_EMAIL: admin@admin.com
            ADMIN_PASSWORD: admin

            # Lunch APi
            LUNCH_API_URL:
            LUNCH_API_KEY:

            # Microsoft azure login
            AZURE_CLIENT_ID:
            AZURE_CLIENT_SECRET:
            AZURE_REDIRECT_URI:
            AZURE_TENANT_ID:
            AZURE_PROXY:

            # AI Chat (Ollama on Leipzig server)
            OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
            AI_CHAT_MODEL: qwen3:8b

        # Security: Add capabilities for Chromium sandbox to work properly
        cap_add:
            - SYS_ADMIN
        security_opt:
            - seccomp:unconfined
        volumes:
            - app-logs:/var/www/html/storage/logs:rw
            - nginx-logs:/var/log/nginx:rw
        depends_on:
            db:
                condition: service_started
            redis:
                condition: service_started
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/"]
            interval: 15s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    db:
        image: mariadb:11.4
        environment:
            MYSQL_DATABASE: wochenplan
            MYSQL_USER: wochenplan
            MYSQL_PASSWORD: wochenplan
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - db-data:/var/lib/mysql
        healthcheck:
            test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -proot || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        volumes:
            - redis-data:/data
        restart: unless-stopped

volumes:
    db-data:
    redis-data:
    app-logs:
    nginx-logs:
