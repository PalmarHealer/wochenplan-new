name: CI

on:
  push:

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Pint, Lint, Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite, bcmath, zip, xml
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run Pint
        run: ./vendor/bin/pint --test

      - name: Run PHP Lint
        run: find app bootstrap config database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run code quality checks
        run: composer validate --strict

      - name: Run test suite
        run: php artisan test --without-tty
